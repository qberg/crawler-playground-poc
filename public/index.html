<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawler Playground</title>
    <style>
      /* Base Resets */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* Design System Variables */
      :root {
        --bg: #ffffff;
        --surface: #ffffff;
        --border: #111111;
        --border-light: #e5e5e5;
        --text: #111111;
        --text-muted: #555555;

        /* Accents */
        --accent: #2563eb;
        --success: #16a34a;
        --warning: #d97706;
        --danger: #dc2626;

        /* Typography */
        --font-sans:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;

        /* Hard Shadows */
        --shadow: 3px 3px 0px var(--border);
        --shadow-hover: 1px 1px 0px var(--border);
      }

      /* Dark Mode Adaptations */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0a0a0a;
          --surface: #141414;
          --border: #333333;
          --border-light: #222222;
          --text: #f5f5f5;
          --text-muted: #a3a3a3;
          --accent: #60a5fa;
          --success: #4ade80;
          --warning: #fbbf24;
          --danger: #f87171;
          --shadow: 3px 3px 0px var(--text);
          --shadow-hover: 1px 1px 0px var(--text);
        }
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .layout {
        max-width: 960px;
        margin: 0 auto;
        padding: 3rem 1.5rem 6rem;
      }

      h1 {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 0.25rem;
      }

      .subtitle {
        font-size: 14px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        margin-bottom: 2.5rem;
        border-bottom: 1px solid var(--border);
        padding-bottom: 1rem;
      }

      .card {
        background: var(--surface);
        border: 2px solid var(--border);
        box-shadow: var(--shadow);
        padding: 1.5rem;
        margin-bottom: 2rem;
      }

      textarea {
        width: 100%;
        height: 100px;
        resize: vertical;
        font-family: var(--font-mono);
        font-size: 14px;
        padding: 12px;
        border: 2px solid var(--border);
        background: var(--bg);
        color: var(--text);
        margin-bottom: 12px;
      }

      textarea:focus {
        outline: none;
        border-color: var(--accent);
      }

      .row {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      button {
        padding: 8px 20px;
        font-size: 14px;
        font-weight: 600;
        font-family: var(--font-mono);
        text-transform: uppercase;
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        box-shadow: 2px 2px 0px var(--border);
        transition: all 0.1s ease;
      }

      button:hover:not(:disabled) {
        transform: translate(1px, 1px);
        box-shadow: 1px 1px 0px var(--border);
      }

      button:active:not(:disabled) {
        transform: translate(2px, 2px);
        box-shadow: 0px 0px 0px var(--border);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      button.primary {
        background: var(--text);
        color: var(--bg);
      }

      .hint {
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        margin-left: auto;
      }

      .section-label {
        font-size: 12px;
        font-weight: 700;
        font-family: var(--font-mono);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text);
        margin: 2.5rem 0 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--border);
      }

      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 2rem;
      }

      .chip {
        font-size: 13px;
        font-family: var(--font-mono);
        padding: 4px 12px;
        border: 1px solid var(--border);
        background: var(--surface);
      }

      .chip b {
        font-weight: 700;
        color: var(--accent);
      }

      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid var(--border-light);
        border-top-color: var(--text);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        margin-top: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        flex-shrink: 0;
      }
      .dot.ok {
        background: var(--success);
      }
      .dot.err {
        background: var(--danger);
      }

      .source-block {
        margin-bottom: 2rem;
      }

      .source-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-bottom: 3px solid var(--border);
        margin-bottom: 12px;
      }

      .source-name {
        font-size: 15px;
        font-weight: 700;
        font-family: var(--font-mono);
        flex: 1;
      }

      .tier-badge {
        font-size: 11px;
        font-family: var(--font-mono);
        font-weight: 600;
        padding: 2px 8px;
        border: 1px solid currentColor;
        text-transform: uppercase;
      }

      .article-card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 1rem 1.5rem;
        margin-bottom: 12px;
        margin-left: 1.5rem;
        border-left: 4px solid var(--border);
      }

      .article-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }

      .meta-box {
        background: var(--bg);
        border: 1px solid var(--border-light);
        padding: 8px 12px;
      }

      .meta-lbl {
        font-size: 11px;
        font-family: var(--font-mono);
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .meta-val {
        font-size: 14px;
        font-weight: 600;
      }

      .bar {
        height: 4px;
        background: var(--border-light);
        margin-top: 6px;
        width: 100%;
      }

      .bar-fill {
        height: 100%;
        background: var(--text);
        transition: width 0.5s ease;
      }
      .bar-q {
        background: var(--accent);
      }
      .bar-r {
        background: var(--warning);
      }

      .kw-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }

      .kw {
        font-size: 12px;
        font-family: var(--font-mono);
        padding: 2px 8px;
        background: var(--bg);
        border: 1px dashed var(--border);
        color: var(--text-muted);
      }

      .event-badge {
        font-size: 12px;
        font-family: var(--font-mono);
        font-weight: 600;
        padding: 2px 8px;
        background: var(--text);
        color: var(--bg);
      }

      .entity-list {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        margin-top: 12px;
        border-top: 1px solid var(--border-light);
        padding-top: 12px;
      }

      .entity-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .ent-type {
        font-size: 10px;
        font-family: var(--font-mono);
        padding: 2px 6px;
        border: 1px solid var(--border);
        text-transform: uppercase;
      }

      .toggle-link {
        font-size: 12px;
        font-family: var(--font-mono);
        font-weight: 600;
        color: var(--accent);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 4px;
        margin-top: 12px;
        display: inline-block;
      }

      .extracted-block {
        display: none;
        margin-top: 12px;
        font-size: 13px;
        font-family: var(--font-mono);
        color: var(--text);
        background: var(--bg);
        padding: 16px;
        max-height: 250px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 1px solid var(--border);
        border-left: 4px solid var(--accent);
      }

      .error-msg {
        font-size: 13px;
        font-family: var(--font-mono);
        color: var(--danger);
        margin-top: 8px;
        padding-left: 12px;
        border-left: 2px solid var(--danger);
      }

      .story-card {
        background: var(--surface);
        border: 2px solid var(--border);
        padding: 1.5rem;
        margin-bottom: 1rem;
        box-shadow: 2px 2px 0px var(--border);
      }

      .story-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .story-title {
        font-size: 18px;
        font-weight: 700;
        line-height: 1.3;
      }

      .conf-badge {
        font-size: 12px;
        font-family: var(--font-mono);
        padding: 4px 8px;
        border: 1px solid var(--border);
        white-space: nowrap;
      }

      .story-reason {
        font-size: 14px;
        color: var(--text-muted);
        margin-bottom: 16px;
        border-left: 2px solid var(--border-light);
        padding-left: 12px;
      }

      .story-article {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 13px;
        padding: 8px 0;
        border-top: 1px dotted var(--border-light);
      }

      .story-src {
        font-size: 11px;
        font-family: var(--font-mono);
        color: var(--text-muted);
        text-transform: uppercase;
      }

      /* * NEW: The "Visual Done" Banner Styles 
       */
      .done-banner {
        background: var(--surface);
        border: 2px solid var(--border);
        border-left: 6px solid var(--success);
        padding: 16px;
        margin-top: 2rem;
        font-family: var(--font-mono);
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 2px 2px 0px var(--border);
      }

      .done-icon {
        background: var(--success);
        color: var(--bg);
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 14px;
      }

      #results {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <h1>Crawler Playground</h1>
      <div class="subtitle">
        [ Pipeline: Source URL → Discover → Extract → NLP → Cluster ]
      </div>

      <div class="card">
        <textarea
          id="url-input"
          placeholder="https://thehindu.com&#10;https://yourstory.com"
        ></textarea>
        <div class="row">
          <button class="primary" id="run-btn" onclick="run()">
            Run Pipeline
          </button>
          <button onclick="clearAll()">Clear</button>
          <span class="hint">1–3 source URLs · One per line</span>
        </div>
      </div>

      <div id="results">
        <div id="summary-row" class="summary-row"></div>

        <div class="section-label">Discovered Articles</div>
        <div id="article-area"></div>

        <div id="story-section" style="display: none">
          <div class="section-label">Proto-Stories Generated</div>
          <div id="story-cards"></div>
        </div>

        <div id="done-banner" style="display: none"></div>
      </div>
    </div>

    <script>
      const state = { sources: [], articles: [], running: false };

      function hn(url) {
        try {
          return new URL(url).hostname.replace("www.", "");
        } catch {
          return url;
        }
      }

      function tierColor(t) {
        const colors = [
          "var(--text-muted)",
          "var(--success)",
          "var(--accent)",
          "var(--warning)",
          "var(--danger)",
        ];
        return colors[t] || "var(--text-muted)";
      }

      function updateSummary() {
        const total = state.articles.length;
        const done = state.articles.filter((a) => a.done).length;
        const good = state.articles.filter((a) => a.nlp).length;
        const nlpDone = state.articles.filter((a) => a.nlp);
        const avgRel = nlpDone.length
          ? (
              nlpDone.reduce((s, a) => s + a.nlp.relevanceScore, 0) /
              nlpDone.length
            ).toFixed(1)
          : null;

        document.getElementById("summary-row").innerHTML = `
          <span class="chip">Processed: <b>${done}/${total}</b></span>
          ${good ? `<span class="chip">Extracted: <b>${good}</b></span>` : ""}
          ${avgRel ? `<span class="chip">Avg Relevance: <b>${avgRel}/10</b></span>` : ""}
        `;
      }

      function renderArticleCard(a) {
        let html = "";
        if (a.extraction?.title) {
          html += `<div class="article-title">${a.extraction.title}</div>`;
        }
        html += `<div class="status-line" id="sl-${a.id}"><div class="spinner"></div><span>Processing text...</span></div>`;

        if (a.extraction) {
          html += `
            <div class="meta-grid">
              <div class="meta-box">
                <div class="meta-lbl">Words</div>
                <div class="meta-val">${a.extraction.wordCount.toLocaleString()}</div>
              </div>
              <div class="meta-box">
                <div class="meta-lbl">Quality</div>
                <div class="meta-val">${a.extraction.qualityScore}/10</div>
                <div class="bar"><div class="bar-fill bar-q" style="width:${a.extraction.qualityScore * 10}%"></div></div>
              </div>
              ${
                a.nlp
                  ? `
              <div class="meta-box">
                <div class="meta-lbl">Relevance</div>
                <div class="meta-val">${a.nlp.relevanceScore}/10</div>
                <div class="bar"><div class="bar-fill bar-r" style="width:${a.nlp.relevanceScore * 10}%"></div></div>
              </div>`
                  : ""
              }
            </div>
          `;
        }

        if (a.nlp) {
          html += `
            <div class="kw-list">
              <span class="event-badge">${a.nlp.eventType || "Unclassified"}</span>
              ${a.nlp.keywords.map((k) => `<span class="kw">${k}</span>`).join("")}
            </div>
          `;
          if (a.nlp.entities?.length) {
            html += `<div class="entity-list">${a.nlp.entities
              .slice(0, 4)
              .map(
                (e) => `
                <div class="entity-row"><span class="ent-type">${e.type}</span><span>${e.name}</span></div>
              `,
              )
              .join("")}</div>`;
          }
        }

        if (a.extraction?.markdown) {
          html += `
            <span class="toggle-link" onclick="toggleEx('${a.id}')">[+] Show Source Markdown</span>
            <div class="extracted-block" id="ex-${a.id}">${a.extraction.markdown.replace(/</g, "&lt;")}</div>
          `;
        }
        if (a.error) html += `<div class="error-msg">Error: ${a.error}</div>`;

        return html;
      }

      window.toggleEx = function (id) {
        const el = document.getElementById("ex-" + id);
        const lk = el?.previousElementSibling;
        if (!el) return;

        const isShown = el.style.display === "block";
        el.style.display = isShown ? "none" : "block";
        if (lk)
          lk.textContent = isShown
            ? "[+] Show Source Markdown"
            : "[-] Hide Source Markdown";
      };

      async function processArticle(a, tier) {
        try {
          const r = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: a.url, tier }),
          });
          const data = await r.json();
          Object.assign(a, data);
        } catch (e) {
          a.error = e.message;
        }
        a.done = true;

        const card = document.getElementById("c-" + a.id);
        if (card) card.innerHTML = renderArticleCard(a);

        const sl = document.getElementById("sl-" + a.id);
        if (sl) {
          sl.innerHTML = a.error
            ? `<div class="dot err"></div><span style="color:var(--danger)">Failed to extract</span>`
            : `<div class="dot ok"></div><span>${a.extraction?.wordCount.toLocaleString()} words · ${a.nlp?.topicSummary || "Processed"}</span>`;
        }
        updateSummary();
      }

      window.run = async function () {
        if (state.running) return;

        const urls = document
          .getElementById("url-input")
          .value.trim()
          .split("\n")
          .map((u) => u.trim())
          .filter((u) => u.startsWith("http"))
          .slice(0, 3);

        if (!urls.length) return;

        state.running = true;
        state.sources = [];
        state.articles = [];

        document.getElementById("run-btn").disabled = true;
        document.getElementById("results").style.display = "block";
        document.getElementById("story-section").style.display = "none";
        document.getElementById("done-banner").style.display = "none"; // Hide done banner
        document.getElementById("article-area").innerHTML = "";
        document.getElementById("story-cards").innerHTML = "";
        document.getElementById("summary-row").innerHTML = "";

        const area = document.getElementById("article-area");

        for (const sourceUrl of urls) {
          const sourceId = btoa(sourceUrl).slice(0, 8);
          const sourceBlock = document.createElement("div");
          sourceBlock.className = "source-block";

          sourceBlock.innerHTML = `
            <div class="source-header" id="sh-${sourceId}">
              <span class="source-name">${hn(sourceUrl)}</span>
              <span class="tier-badge">Discovering...</span>
              <div class="spinner"></div>
            </div>
            <div id="articles-${sourceId}"></div>
          `;
          area.appendChild(sourceBlock);

          let tier = 2;
          try {
            const r = await fetch("/api/discover", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ url: sourceUrl }),
            });
            const data = await r.json();
            tier = data.tier?.tier || 2;

            const sh = document.getElementById("sh-" + sourceId);
            if (sh) {
              sh.innerHTML = `
                <span class="source-name">${hn(sourceUrl)}</span>
                <span class="tier-badge" style="color:${tierColor(tier)}">${data.tier?.label || "Unknown Tier"}</span>
                <span style="font-size:12px;font-family:var(--font-mono);color:var(--text-muted)">[${data.articles.length} found]</span>
              `;
            }

            const articlesEl = document.getElementById("articles-" + sourceId);
            const newArticles = data.articles.map((url, i) => ({
              id: "a" + state.articles.length + i,
              url,
              sourceUrl,
              done: false,
              extraction: null,
              nlp: null,
              error: null,
            }));

            state.articles.push(...newArticles);

            articlesEl.innerHTML = newArticles
              .map(
                (a) => `
              <div class="article-card" id="c-${a.id}">
                <div style="font-size:12px;font-family:var(--font-mono);color:var(--text-muted);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.url}</div>
                <div class="status-line" id="sl-${a.id}"><div class="spinner"></div><span>In Queue...</span></div>
              </div>
            `,
              )
              .join("");

            updateSummary();

            const queue = [...newArticles];
            const workers = Array.from(
              { length: Math.min(3, queue.length) },
              async () => {
                while (queue.length) {
                  const a = queue.shift();
                  if (a) await processArticle(a, tier);
                }
              },
            );
            await Promise.all(workers);
          } catch (e) {
            const sh = document.getElementById("sh-" + sourceId);
            if (sh) {
              sh.innerHTML = `<span class="source-name">${hn(sourceUrl)}</span><span style="font-size:12px;font-family:var(--font-mono);color:var(--danger)">Error: ${e.message}</span>`;
            }
          }
        }

        const good = state.articles.filter((a) => a.nlp && !a.error);
        if (good.length >= 2) {
          const sec = document.getElementById("story-section");
          const cards = document.getElementById("story-cards");

          sec.style.display = "block";
          cards.innerHTML = `
            <div class="card">
              <div class="status-line"><div class="spinner"></div><span style="color:var(--text)">Clustering ${good.length} valid articles into stories...</span></div>
            </div>
          `;

          try {
            const r = await fetch("/api/cluster", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ articles: good }),
            });
            const data = await r.json();

            if (data.stories?.length) {
              cards.innerHTML = data.stories
                .map((s) => {
                  const conf = Math.round((s.confidence || 0) * 100);
                  return `
                  <div class="story-card">
                    <div class="story-header">
                      <span class="story-title">${s.title}</span>
                      <span class="conf-badge">${conf}% Match</span>
                    </div>
                    <p class="story-reason">${s.reason || "No reasoning provided by engine."}</p>
                    ${s.indices
                      .map((i) => good[i])
                      .filter(Boolean)
                      .map(
                        (a) => `
                      <div class="story-article">
                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;">
                          ${a.extraction?.title || hn(a.url)}
                        </span>
                        <span class="story-src">${hn(a.url)}</span>
                      </div>
                    `,
                      )
                      .join("")}
                  </div>
                `;
                })
                .join("");
            } else {
              cards.innerHTML =
                '<div class="card"><p style="font-family:var(--font-mono);color:var(--text-muted)">[ No significant overlap found for clustering ]</p></div>';
            }
          } catch (e) {
            cards.innerHTML = `<div class="error-msg">Clustering failed: ${e.message}</div>`;
          }
        }

        // NEW: Render the Visual Done Banner
        const doneBanner = document.getElementById("done-banner");
        doneBanner.className = "done-banner";
        doneBanner.style.display = "flex";
        doneBanner.innerHTML = `
          <div>
            Pipeline Complete
            <div style="font-size: 12px; font-weight: normal; color: var(--text-muted); margin-top: 2px;">
              Successfully processed and analyzed ${good.length} out of ${state.articles.length} articles.
            </div>
          </div>
        `;

        state.running = false;
        document.getElementById("run-btn").disabled = false;
      };

      window.clearAll = function () {
        document.getElementById("url-input").value = "";
        document.getElementById("results").style.display = "none";
        document.getElementById("article-area").innerHTML = "";
        document.getElementById("story-cards").innerHTML = "";
        document.getElementById("done-banner").style.display = "none";
        state.sources = [];
        state.articles = [];
      };
    </script>
  </body>
</html>
