<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crawler Playground</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f9f9f8;
        --surface: #ffffff;
        --border: rgba(0, 0, 0, 0.1);
        --border-mid: rgba(0, 0, 0, 0.18);
        --text: #1a1a18;
        --text-secondary: #6b6b67;
        --text-tertiary: #9b9b96;
        --radius-md: 8px;
        --radius-lg: 12px;
        --green: #3b6d11;
        --green-bg: #eaf3de;
        --blue: #185fa5;
        --blue-bg: #e6f1fb;
        --amber: #854f0b;
        --amber-bg: #faeeda;
        --pink: #993556;
        --pink-bg: #fbeaf0;
        --purple: #534ab7;
        --purple-bg: #eeedfe;
        --teal: #0f6e56;
        --teal-bg: #e1f5ee;
        --red: #a32d2d;
        --mono: "SF Mono", "Fira Mono", monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1a1a18;
          --surface: #242422;
          --border: rgba(255, 255, 255, 0.1);
          --border-mid: rgba(255, 255, 255, 0.18);
          --text: #f0f0ec;
          --text-secondary: #a0a09b;
          --text-tertiary: #70706b;
          --green: #97c459;
          --green-bg: #173404;
          --blue: #85b7eb;
          --blue-bg: #042c53;
          --amber: #ef9f27;
          --amber-bg: #412402;
          --pink: #ed93b1;
          --pink-bg: #4b1528;
          --purple: #afa9ec;
          --purple-bg: #26215c;
          --teal: #5dcaa5;
          --teal-bg: #04342c;
          --red: #f09595;
        }
      }

      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        font-size: 15px;
        line-height: 1.6;
      }

      .layout {
        max-width: 860px;
        margin: 0 auto;
        padding: 2rem 1.5rem 4rem;
      }

      h1 {
        font-size: 20px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 13px;
        color: var(--text-secondary);
        margin-bottom: 1.75rem;
      }

      .card {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1.25rem;
      }

      .input-section {
        margin-bottom: 1.25rem;
      }

      textarea {
        width: 100%;
        height: 110px;
        resize: vertical;
        font-family: var(--mono);
        font-size: 13px;
        padding: 10px 12px;
        border: 0.5px solid var(--border);
        border-radius: var(--radius-md);
        background: var(--bg);
        color: var(--text);
        margin-bottom: 10px;
        line-height: 1.6;
      }
      textarea:focus {
        outline: none;
        border-color: var(--border-mid);
      }

      .actions {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      button {
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 500;
        border: 0.5px solid var(--border-mid);
        border-radius: var(--radius-md);
        background: transparent;
        color: var(--text);
        cursor: pointer;
        transition: background 0.1s;
      }
      button:hover {
        background: var(--bg);
      }
      button:active {
        transform: scale(0.98);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      button.primary {
        background: var(--text);
        color: var(--surface);
        border-color: transparent;
      }
      button.primary:hover {
        opacity: 0.88;
      }

      .hint {
        font-size: 12px;
        color: var(--text-tertiary);
        margin-left: auto;
      }

      .section-label {
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-tertiary);
        margin: 1.75rem 0 0.75rem;
      }

      .summary-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 1.25rem;
      }
      .sum-chip {
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 20px;
        border: 0.5px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
      }
      .sum-chip b {
        color: var(--text);
        font-weight: 500;
      }

      .url-card {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 1rem 1.25rem;
        margin-bottom: 10px;
      }

      .url-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .hostname {
        font-size: 14px;
        font-weight: 500;
        flex: 1;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tier-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 3px 9px;
        border-radius: 20px;
        white-space: nowrap;
      }
      .t1 {
        background: var(--green-bg);
        color: var(--green);
      }
      .t2 {
        background: var(--blue-bg);
        color: var(--blue);
      }
      .t3 {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .t4 {
        background: var(--pink-bg);
        color: var(--pink);
      }
      .t0 {
        background: var(--bg);
        color: var(--text-tertiary);
        border: 0.5px solid var(--border);
      }

      .status-line {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-secondary);
        min-height: 20px;
      }

      .spinner {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        border: 1.5px solid var(--border-mid);
        border-top-color: var(--text-secondary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.ok {
        background: var(--green);
      }
      .dot.err {
        background: var(--red);
      }

      .meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .meta-box {
        background: var(--bg);
        border-radius: var(--radius-md);
        padding: 8px 10px;
      }
      .meta-lbl {
        font-size: 11px;
        color: var(--text-tertiary);
        margin-bottom: 2px;
      }
      .meta-val {
        font-size: 13px;
        font-weight: 500;
      }
      .bar {
        height: 3px;
        border-radius: 2px;
        background: var(--border);
        margin-top: 5px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 2px;
        transition: width 0.5s ease;
      }
      .bar-fill.quality {
        background: var(--blue);
      }
      .bar-fill.relevance {
        background: var(--teal);
      }

      .kw-list {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-top: 10px;
      }
      .kw {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        background: var(--bg);
        color: var(--text-secondary);
        border: 0.5px solid var(--border);
      }

      .entity-list {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .entity-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }
      .ent-type {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 20px;
        background: var(--purple-bg);
        color: var(--purple);
        font-weight: 500;
      }

      .relevance-reason {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 8px;
        font-style: italic;
      }
      .rss-url {
        font-size: 11px;
        color: var(--text-tertiary);
        font-family: var(--mono);
        margin-top: 4px;
        word-break: break-all;
      }

      .toggle-link {
        font-size: 12px;
        color: var(--text-tertiary);
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
        margin-top: 10px;
        display: inline-block;
      }
      .extracted-block {
        display: none;
        margin-top: 8px;
        font-size: 12px;
        font-family: var(--mono);
        color: var(--text-secondary);
        background: var(--bg);
        border-radius: var(--radius-md);
        padding: 10px;
        max-height: 180px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
        border: 0.5px solid var(--border);
      }

      .error-msg {
        font-size: 12px;
        color: var(--red);
        margin-top: 6px;
      }

      .cluster-card {
        background: var(--surface);
        border: 0.5px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 0.875rem 1.25rem;
        margin-bottom: 8px;
      }
      .cluster-label {
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      .cluster-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--text-secondary);
        padding: 3px 0;
      }
      .cluster-item::before {
        content: "";
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--border-mid);
        flex-shrink: 0;
      }
      .cluster-topic {
        color: var(--text-tertiary);
        font-size: 11px;
      }

      #results {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <h1>Crawler playground</h1>
      <p class="subtitle">
        Tier detection → URL extraction → NLP analysis → clustering
      </p>

      <div class="card input-section">
        <textarea
          id="url-input"
          placeholder="https://thehindu.com&#10;https://yourstory.com&#10;https://startuptn.in&#10;https://inc42.com"
        ></textarea>
        <div class="actions">
          <button class="primary" id="run-btn" onclick="run()">
            Run pipeline
          </button>
          <button onclick="clearAll()">Clear</button>
          <span class="hint">One URL per line · max 10</span>
        </div>
      </div>

      <div id="results">
        <div id="summary-row" class="summary-row"></div>
        <div class="section-label">Per-URL results</div>
        <div id="url-cards"></div>
        <div id="cluster-section" style="display: none">
          <div class="section-label">Clusters</div>
          <div id="cluster-cards"></div>
        </div>
      </div>
    </div>

    <script>
      const state = { results: [], running: false };

      function hostname(url) {
        try {
          return new URL(url).hostname.replace("www.", "");
        } catch {
          return url;
        }
      }

      function tierClass(tier) {
        return ["t0", "t1", "t2", "t3", "t4"][tier] || "t0";
      }

      function updateSummary() {
        const r = state.results;
        const done = r.filter((x) => x.done).length;
        const t1 = r.filter((x) => x.tier?.tier === 1).length;
        const t2 = r.filter((x) => x.tier?.tier === 2).length;
        const t3 = r.filter((x) => x.tier?.tier === 3).length;
        const nlpDone = r.filter((x) => x.nlp);
        const avgRel = nlpDone.length
          ? (
              nlpDone.reduce((a, x) => a + x.nlp.relevanceScore, 0) /
              nlpDone.length
            ).toFixed(1)
          : null;

        document.getElementById("summary-row").innerHTML = [
          `<span class="sum-chip"><b>${done}/${r.length}</b> done</span>`,
          t1 ? `<span class="sum-chip">RSS <b>${t1}</b></span>` : "",
          t2 ? `<span class="sum-chip">HTML <b>${t2}</b></span>` : "",
          t3 ? `<span class="sum-chip">JS <b>${t3}</b></span>` : "",
          avgRel
            ? `<span class="sum-chip">avg relevance <b>${avgRel}/10</b></span>`
            : "",
        ].join("");
      }

      function renderCard(res) {
        const tierLabel = res.tier?.label || "detecting...";
        const tc = tierClass(res.tier?.tier || 0);

        let html = `
    <div class="url-card-header">
      <span class="hostname">${hostname(res.url)}</span>
      <span class="tier-badge ${tc}">${tierLabel}</span>
    </div>`;

        if (res.tier?.rssUrl) {
          html += `<div class="rss-url">${res.tier.rssUrl}</div>`;
        }

        html += `<div class="status-line" id="sl-${res.id}">
    <div class="spinner"></div><span>Processing...</span>
  </div>`;

        if (res.extraction) {
          html += `<div class="meta-grid">
      <div class="meta-box">
        <div class="meta-lbl">Words extracted</div>
        <div class="meta-val">${res.extraction.wordCount.toLocaleString()}</div>
      </div>
      <div class="meta-box">
        <div class="meta-lbl">Quality score</div>
        <div class="meta-val">${res.extraction.qualityScore}/10</div>
        <div class="bar"><div class="bar-fill quality" style="width:${res.extraction.qualityScore * 10}%"></div></div>
      </div>
      ${
        res.nlp
          ? `<div class="meta-box">
        <div class="meta-lbl">TN relevance</div>
        <div class="meta-val">${res.nlp.relevanceScore}/10</div>
        <div class="bar"><div class="bar-fill relevance" style="width:${res.nlp.relevanceScore * 10}%"></div></div>
      </div>`
          : ""
      }
    </div>`;
        }

        if (res.nlp) {
          html += `<div class="kw-list">${res.nlp.keywords.map((k) => `<span class="kw">${k}</span>`).join("")}</div>`;
          if (res.nlp.entities?.length) {
            html += `<div class="entity-list">${res.nlp.entities
              .slice(0, 5)
              .map(
                (e) =>
                  `<div class="entity-row"><span class="ent-type">${e.type}</span><span>${e.name}</span></div>`,
              )
              .join("")}</div>`;
          }
          if (res.nlp.relevanceReason) {
            html += `<p class="relevance-reason">${res.nlp.relevanceReason}</p>`;
          }
        }

        if (res.extraction?.markdown) {
          html += `<span class="toggle-link" onclick="toggleExtracted('${res.id}')">show extracted text</span>
    <div class="extracted-block" id="ex-${res.id}">${res.extraction.markdown.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
        }

        if (res.error) {
          html += `<p class="error-msg">${res.error}</p>`;
        }

        return html;
      }

      function setStatus(id, html) {
        const el = document.getElementById("sl-" + id);
        if (el) el.innerHTML = html;
      }

      function toggleExtracted(id) {
        const el = document.getElementById("ex-" + id);
        const link = el?.previousElementSibling;
        if (!el) return;
        const shown = el.style.display === "block";
        el.style.display = shown ? "none" : "block";
        if (link)
          link.textContent = shown
            ? "show extracted text"
            : "hide extracted text";
      }

      async function processUrl(res) {
        const cardEl = document.getElementById("c-" + res.id);

        try {
          const response = await fetch("/api/analyze", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ url: res.url }),
          });
          const data = await response.json();
          Object.assign(res, data);
        } catch (e) {
          res.error = e.message;
        }

        res.done = true;
        if (cardEl) {
          cardEl.innerHTML = renderCard(res);
          const sl = document.getElementById("sl-" + res.id);
          if (sl) {
            if (res.error) {
              sl.innerHTML = `<div class="dot err"></div><span style="color:var(--red)">${res.error}</span>`;
            } else {
              sl.innerHTML = `<div class="dot ok"></div><span>${res.extraction?.wordCount.toLocaleString()} words extracted</span>`;
            }
          }
        }

        updateSummary();
      }

      async function run() {
        if (state.running) return;

        const raw = document
          .getElementById("url-input")
          .value.trim()
          .split("\n")
          .map((u) => u.trim())
          .filter((u) => u.startsWith("http"))
          .slice(0, 10);

        if (!raw.length) return;

        state.running = true;
        state.results = raw.map((url, i) => ({
          id: "u" + i,
          url,
          tier: null,
          extraction: null,
          nlp: null,
          done: false,
          error: null,
        }));

        document.getElementById("run-btn").disabled = true;
        document.getElementById("results").style.display = "block";
        document.getElementById("cluster-section").style.display = "none";

        const cardsEl = document.getElementById("url-cards");
        cardsEl.innerHTML = state.results
          .map(
            (r) => `
    <div class="url-card" id="c-${r.id}">
      <div class="url-card-header">
        <span class="hostname">${hostname(r.url)}</span>
        <span class="tier-badge t0">detecting...</span>
      </div>
      <div class="status-line" id="sl-${r.id}"><div class="spinner"></div><span>Queued</span></div>
    </div>`,
          )
          .join("");

        updateSummary();

        const queue = [...state.results];
        const workers = Array.from(
          { length: Math.min(3, queue.length) },
          async () => {
            while (queue.length) {
              const res = queue.shift();
              if (res) await processUrl(res);
            }
          },
        );
        await Promise.all(workers);

        const successful = state.results.filter((r) => r.nlp && !r.error);
        if (successful.length >= 2) {
          const sec = document.getElementById("cluster-section");
          const cards = document.getElementById("cluster-cards");
          sec.style.display = "block";
          cards.innerHTML = `<div class="url-card"><div class="status-line"><div class="spinner"></div><span>Clustering ${successful.length} sources...</span></div></div>`;

          try {
            const res = await fetch("/api/cluster", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ results: successful }),
            });
            const data = await res.json();

            if (data.clusters?.length) {
              cards.innerHTML = data.clusters
                .map(
                  (c) => `
          <div class="cluster-card">
            <div class="cluster-label">${c.label}</div>
            ${c.indices
              .map((i) => successful[i])
              .filter(Boolean)
              .map(
                (r) => `
              <div class="cluster-item">
                <span>${hostname(r.url)}</span>
                <span class="cluster-topic">${r.nlp?.topicSummary || ""}</span>
              </div>`,
              )
              .join("")}
          </div>`,
                )
                .join("");
            } else {
              cards.innerHTML =
                '<p style="font-size:13px;color:var(--text-secondary)">Not enough data to cluster.</p>';
            }
          } catch (e) {
            cards.innerHTML = `<p class="error-msg">Clustering failed: ${e.message}</p>`;
          }
        }

        state.running = false;
        document.getElementById("run-btn").disabled = false;
      }

      function clearAll() {
        document.getElementById("url-input").value = "";
        document.getElementById("results").style.display = "none";
        document.getElementById("url-cards").innerHTML = "";
        document.getElementById("cluster-cards").innerHTML = "";
        state.results = [];
      }
    </script>
  </body>
</html>
